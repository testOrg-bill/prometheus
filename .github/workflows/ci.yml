name: CI

on:
  pull_request:
  push:
    branches: [main, 'release-*']
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pre-pull-image:
    name: Pre-pull Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Pull golang-builder images
        run: |
          docker pull quay.io/prometheus/golang-builder:1.26-base
          docker pull quay.io/prometheus/golang-builder:1.25-base

  test_ui:
    name: UI tests
    needs: pre-pull-image
    runs-on: ubuntu-latest
    container:
      image: quay.io/prometheus/golang-builder:1.26-base

    steps:
      - name: Debug container DNS
        run: |
          echo "--- /etc/hosts ---"
          cat /etc/hosts

          echo "--- /etc/resolv.conf ---"
          cat /etc/resolv.conf

          echo "--- results-receiver.actions.githubusercontent.com ---"
          getent hosts results-receiver.actions.githubusercontent.com || true

          echo "--- github.com ---"
          getent hosts github.com || true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Prometheus CI dependencies
        uses: prometheus/promci-setup@5af30ba8c199a91d6c04ebdc3c48e630e355f62d
        with:
          enable_go: false
          enable_npm: true

      - name: Build UI tarball
        run: make assets-tarball

      - name: Run UI lint
        run: make ui-lint

      - name: Run UI tests
        run: make ui-test
        env:
          NODE_OPTIONS: "--no-experimental-vm-modules"
          GENERATE_SOURCEMAP: "false"

      - name: Save UI artifacts
        uses: prometheus/promci-artifacts/save@f9a587dbc0b2c78a0c54f8ad1cde71ea29a4b76f
        continue-on-error: true
        with:
          directory: .tarballs
